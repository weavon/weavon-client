name: Pull Request Actions

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

  prettier-check:
    name: Prettier Check
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Run Prettier
        run: pnpm prettier --check .

  eslint-check:
    name: Eslint Check
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Run Eslint
        run: pnpm eslint .

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Run Build
        run: pnpm build
